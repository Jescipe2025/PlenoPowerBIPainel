<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard JESCIPE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #0f1729;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 16px;
            background: #1a2744;
            color: white;
            font-size: 13px;
        }
        .topbar span { opacity: 0.7; }
        .topbar a {
            color: #f87171;
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
        }
        .topbar a:hover { text-decoration: underline; }
        iframe {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
        }
        .em-construcao {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            gap: 16px;
        }
        .em-construcao .icone { font-size: 80px; }
        .em-construcao h1 { font-size: 32px; color: #f59e0b; }
        .em-construcao p { font-size: 16px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="topbar">
        <span>📊 Dashboard JESCIPE — {{ painel | capitalize }}</span>
        <a href="/logout">Sair</a>
    </div>
    {% if url %}
        <iframe src="{{ url }}" allowfullscreen></iframe>
    {% else %}
        <div class="em-construcao">
            <div class="icone">🚧</div>
            <h1>Em Construção</h1>
            <p>O painel <strong>{{ painel | capitalize }}</strong> estará disponível em breve.</p>
        </div>
    {% endif %}
</body>
</html>
