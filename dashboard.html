<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard JESCIPE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #0f1729;
        }

        /* Barra superior discreta */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 16px;
            background: #1a2744;
            color: white;
            font-size: 13px;
        }
        .topbar span { opacity: 0.7; }
        .topbar a {
            color: #f87171;
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
        }
        .topbar a:hover { text-decoration: underline; }

        /* Power BI ocupa o resto da tela */
        iframe {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <span>📊 Dashboard JESCIPE — SA Pleno</span>
        <a href="/logout">Sair</a>
    </div>

    <!-- A URL fica no servidor, o iframe apenas carrega o conteúdo -->
    <iframe src="{{ url }}" allowfullscreen></iframe>

</body>
</html>
